<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Aero World</title>
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600;700&family=Trebuchet+MS&display=swap" rel="stylesheet">
  <style>
    *{margin:0;box-sizing:border-box}
    :root{
      --sky1:#c8dff5;--sky2:#a0c4e8;--sky3:#6aaad4;
      --glass-bg:rgba(255,255,255,0.35);
      --glass-border:rgba(255,255,255,0.75);
      --glass-shadow:rgba(100,160,220,0.25);
      --aero-blue:#1e6bbf;--aero-blue2:#3a8ee6;
      --text-dark:#1a2a3a;--text-mid:#3a5070;--text-light:#5a7090;
      --btn-top:rgba(255,255,255,0.95);--btn-bot:rgba(180,215,250,0.8);
      --active-top:rgba(120,185,245,0.95);--active-bot:rgba(50,130,210,0.9);
    }
    body{
      font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
      background:linear-gradient(160deg,#b8d8f5 0%,#d0e8f8 30%,#e8f3fc 55%,#cce0f5 80%,#a8cce8 100%);
      min-height:100vh;color:var(--text-dark);font-size:13px;
      background-attachment:fixed;
    }
    /* Aero glass panel mixin */
    .glass{
      background:linear-gradient(180deg,rgba(255,255,255,0.55) 0%,rgba(200,230,255,0.3) 50%,rgba(160,210,250,0.4) 100%);
      border:1px solid rgba(255,255,255,0.8);
      border-bottom-color:rgba(150,200,240,0.6);
      box-shadow:0 2px 12px rgba(80,140,200,0.18),inset 0 1px 0 rgba(255,255,255,0.9),inset 0 -1px 0 rgba(150,200,240,0.3);
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    }
    #app{max-width:540px;margin:0 auto;padding:0 0 80px}
    /* Wider container when sidebar is shown */
    #app:has(.two-col-layout){max-width:760px}

    /* NAV */
    nav{
      position:fixed;top:0;left:0;right:0;z-index:99;height:50px;
      background:linear-gradient(180deg,rgba(180,220,255,0.85) 0%,rgba(140,195,245,0.7) 45%,rgba(100,165,230,0.75) 50%,rgba(140,195,248,0.65) 100%);
      border-bottom:1px solid rgba(255,255,255,0.6);
      box-shadow:0 2px 16px rgba(50,120,200,0.3),inset 0 1px 0 rgba(255,255,255,0.95);
      backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
      display:flex;align-items:center;padding:0 10px 0 14px;gap:6px;overflow:hidden;
    }
    .logo{
      font-size:18px;font-weight:700;letter-spacing:.05em;
      background:linear-gradient(180deg,#fff 0%,#b0d8f8 50%,#5a9fd4 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      text-shadow:none;filter:drop-shadow(0 1px 2px rgba(30,80,160,0.4));
      display:flex;align-items:center;flex-shrink:0;
    }
    .nav-links{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;flex:1;min-width:0}
    .nav-links::-webkit-scrollbar{display:none}
    .nav-links button{
      background:linear-gradient(180deg,rgba(255,255,255,0.7) 0%,rgba(190,225,255,0.5) 100%);
      border:1px solid rgba(255,255,255,0.8);border-bottom-color:rgba(140,190,240,0.5);
      border-radius:14px;cursor:pointer;color:var(--text-dark);font-family:inherit;
      font-size:11.5px;font-weight:600;padding:4px 10px;white-space:nowrap;flex-shrink:0;
      box-shadow:0 1px 4px rgba(80,140,200,0.15),inset 0 1px 0 rgba(255,255,255,0.9);
      transition:all .15s;letter-spacing:.02em;
    }
    .nav-links button:hover{background:linear-gradient(180deg,rgba(255,255,255,0.9) 0%,rgba(210,235,255,0.7) 100%)}
    .nav-links button.active{
      background:linear-gradient(180deg,rgba(100,170,240,0.9) 0%,rgba(50,120,210,0.85) 50%,rgba(80,150,230,0.8) 100%);
      color:#fff;border-color:rgba(30,100,200,0.5);
      box-shadow:0 1px 6px rgba(30,100,200,0.35),inset 0 1px 0 rgba(255,255,255,0.35),inset 0 -1px 0 rgba(0,60,150,0.2);
    }
    .main{padding-top:66px}

    /* AUTH */
    .auth{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;gap:10px}
    .auth-panel{
      width:100%;max-width:320px;padding:28px 24px;
      background:linear-gradient(180deg,rgba(255,255,255,0.6) 0%,rgba(210,235,255,0.45) 50%,rgba(185,220,250,0.5) 100%);
      border:1px solid rgba(255,255,255,0.85);border-bottom-color:rgba(140,195,240,0.5);
      border-radius:10px;
      box-shadow:0 8px 32px rgba(60,130,210,0.2),inset 0 1px 0 rgba(255,255,255,0.95),0 1px 0 rgba(255,255,255,0.5);
      backdrop-filter:blur(16px);
      display:flex;flex-direction:column;gap:10px;align-items:center;
    }
    .auth h1{
      font-size:26px;font-weight:700;letter-spacing:.04em;margin-bottom:8px;
      background:linear-gradient(180deg,#fff 0%,#90c8f0 40%,#3a80c8 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      filter:drop-shadow(0 2px 4px rgba(30,80,160,0.3));
    }
    .auth-sub{font-size:11px;color:var(--text-light);letter-spacing:.08em;margin-top:-8px;margin-bottom:4px}
    input{
      width:100%;max-width:260px;padding:8px 12px;font-family:inherit;font-size:13px;
      background:linear-gradient(180deg,rgba(220,238,255,0.6) 0%,rgba(255,255,255,0.8) 100%);
      border:1px solid rgba(140,195,240,0.7);border-top-color:rgba(100,160,220,0.5);
      border-radius:5px;color:var(--text-dark);outline:none;
      box-shadow:inset 0 2px 4px rgba(80,140,200,0.12),0 1px 0 rgba(255,255,255,0.8);
      transition:border .15s,box-shadow .15s;
    }
    input:focus{border-color:rgba(50,130,220,0.8);box-shadow:inset 0 2px 4px rgba(50,120,210,0.15),0 0 0 3px rgba(80,160,240,0.18)}
    input::placeholder{color:#9ab8d0}

    /* AERO BUTTONS */
    .btn{
      width:100%;max-width:260px;padding:9px 18px;font-family:inherit;font-size:12px;
      font-weight:600;letter-spacing:.06em;cursor:pointer;border-radius:20px;
      background:linear-gradient(180deg,rgba(255,255,255,0.95) 0%,rgba(200,230,255,0.85) 49%,rgba(150,205,250,0.9) 50%,rgba(190,225,255,0.8) 100%);
      border:1px solid rgba(120,185,240,0.7);
      color:var(--aero-blue);
      box-shadow:0 2px 8px rgba(60,130,210,0.25),inset 0 1px 0 rgba(255,255,255,0.95),0 1px 0 rgba(255,255,255,0.6);
      transition:all .15s;
    }
    .btn:hover{
      background:linear-gradient(180deg,rgba(255,255,255,1) 0%,rgba(220,240,255,0.95) 49%,rgba(170,215,255,0.95) 50%,rgba(210,235,255,0.9) 100%);
      box-shadow:0 3px 12px rgba(60,130,210,0.35),inset 0 1px 0 rgba(255,255,255,1);
    }
    .btn:active{
      background:linear-gradient(180deg,rgba(140,195,245,0.9) 0%,rgba(100,165,230,0.85) 49%,rgba(80,150,220,0.9) 50%,rgba(120,185,245,0.85) 100%);
      color:#fff;box-shadow:inset 0 2px 4px rgba(30,80,160,0.2);
    }
    .btn-primary{
      background:linear-gradient(180deg,rgba(100,175,245,0.95) 0%,rgba(60,140,225,0.9) 49%,rgba(40,120,210,0.95) 50%,rgba(80,160,240,0.9) 100%);
      color:#fff;border-color:rgba(30,100,200,0.6);
      box-shadow:0 2px 10px rgba(30,100,200,0.35),inset 0 1px 0 rgba(255,255,255,0.45),inset 0 -1px 0 rgba(0,60,160,0.2);
    }
    .btn-primary:hover{
      background:linear-gradient(180deg,rgba(130,195,255,0.98) 0%,rgba(80,160,240,0.95) 49%,rgba(60,140,225,0.98) 50%,rgba(100,175,248,0.95) 100%);
    }
    .btn-ghost{background:linear-gradient(180deg,rgba(255,255,255,0.5) 0%,rgba(220,235,250,0.35) 100%);color:var(--text-mid);border-color:rgba(150,195,235,0.5)}
    .err{color:#c0392b;font-size:11px;max-width:260px;text-align:center;background:rgba(255,220,220,0.5);border-radius:4px;padding:4px 8px}

    /* TIMEOUT BANNER */
    .timeout-banner{
      margin:10px 12px 0;border-radius:10px;
      background:linear-gradient(180deg,rgba(255,230,200,0.75) 0%,rgba(255,200,160,0.6) 100%);
      border:1px solid rgba(240,160,80,0.6);border-bottom-color:rgba(200,120,40,0.4);
      box-shadow:0 2px 10px rgba(200,120,40,0.15),inset 0 1px 0 rgba(255,255,255,0.8);
      padding:12px 16px;display:flex;align-items:center;gap:10px;
      animation:fadeUp .25s ease;
    }
    .timeout-icon{font-size:22px;line-height:1;flex-shrink:0}
    .timeout-text{flex:1;min-width:0}
    .timeout-text strong{display:block;font-size:12.5px;color:#7a3800;font-weight:700;margin-bottom:2px}
    .timeout-text span{font-size:11px;color:#a05010}
    .timeout-compose-block{
      pointer-events:none;opacity:0.45;user-select:none;
    }

    /* COMPOSE */
    .compose{
      margin:12px 12px 0;border-radius:10px;
      background:linear-gradient(180deg,rgba(255,255,255,0.55) 0%,rgba(210,235,255,0.4) 100%);
      border:1px solid rgba(255,255,255,0.85);border-bottom-color:rgba(140,195,240,0.4);
      box-shadow:0 4px 16px rgba(80,150,220,0.12),inset 0 1px 0 rgba(255,255,255,0.95);
      padding:14px 16px;
    }
    textarea{
      width:100%;resize:none;border:none;font-family:inherit;font-size:13px;
      color:var(--text-dark);background:transparent;outline:none;min-height:52px;
    }
    textarea::placeholder{color:#9ab8d0}
    .compose-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px;gap:6px;min-width:0}
    .media-btn{
      display:flex;align-items:center;gap:4px;padding:5px 9px;font-family:inherit;font-size:11px;
      font-weight:600;cursor:pointer;border-radius:14px;color:#5a9fd4;white-space:nowrap;flex-shrink:0;
      background:rgba(100,175,245,0.12);border:1px solid rgba(100,175,245,0.35);
      transition:all .15s;
    }
    .media-btn:hover{background:rgba(100,175,245,0.22)}
    #media-preview-wrap{margin-top:10px;position:relative;display:inline-block;max-width:100%}
    #media-preview-wrap img,#media-preview-wrap video{max-width:100%;max-height:280px;border-radius:8px;display:block;border:1px solid rgba(100,175,245,0.3)}
    #media-clear{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.55);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:13px;cursor:pointer;line-height:22px;text-align:center}
    .post-media{margin-top:8px}
    .post-media img{max-width:100%;border-radius:8px;display:block;border:1px solid rgba(100,175,245,0.2)}
    .post-media video{max-width:100%;border-radius:8px;display:block;border:1px solid rgba(100,175,245,0.2)}
    #media-err{font-size:11px;color:#d94f4f;margin-top:4px}

    /* EMOJI & STICKER PICKER */
    .picker-btn{
      display:flex;align-items:center;gap:4px;padding:5px 9px;font-family:inherit;font-size:11px;
      font-weight:600;cursor:pointer;border-radius:14px;color:#5a9fd4;white-space:nowrap;flex-shrink:0;
      background:rgba(100,175,245,0.12);border:1px solid rgba(100,175,245,0.35);
      transition:all .15s;
    }
    .picker-btn:hover{background:rgba(100,175,245,0.22)}
    .picker-btn.active{background:rgba(100,175,245,0.28);border-color:rgba(60,140,220,0.55)}
    .picker-popup{
      position:fixed;
      z-index:500;
      width:300px;max-height:320px;
      background:linear-gradient(180deg,rgba(240,250,255,0.97) 0%,rgba(215,235,255,0.96) 100%);
      border:1px solid rgba(255,255,255,0.9);border-bottom-color:rgba(140,195,240,0.6);
      border-radius:12px;
      box-shadow:0 8px 32px rgba(60,130,210,0.22),inset 0 1px 0 rgba(255,255,255,1);
      backdrop-filter:blur(16px);
      display:flex;flex-direction:column;overflow:hidden;
      animation:fadeUp .18s ease;
    }
    .picker-tabs{
      display:flex;border-bottom:1px solid rgba(140,195,240,0.3);flex-shrink:0;
    }
    .picker-tab{
      flex:1;padding:7px 4px;font-family:inherit;font-size:10.5px;font-weight:700;
      letter-spacing:.07em;text-transform:uppercase;cursor:pointer;
      background:none;border:none;color:var(--text-light);transition:all .15s;
    }
    .picker-tab.active{
      color:var(--aero-blue);
      background:linear-gradient(180deg,rgba(255,255,255,0.6) 0%,rgba(210,235,255,0.4) 100%);
      box-shadow:inset 0 -2px 0 var(--aero-blue2);
    }
    .picker-body{overflow-y:auto;flex:1;padding:8px}
    .picker-grid{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(44px,1fr));gap:4px;
    }
    .picker-item{
      display:flex;align-items:center;justify-content:center;
      border-radius:8px;padding:4px;cursor:pointer;
      transition:background .12s,transform .1s;
      border:1px solid transparent;
      aspect-ratio:1;
    }
    .picker-item:hover{
      background:rgba(100,175,245,0.18);border-color:rgba(100,175,245,0.35);
      transform:scale(1.08);
    }
    .picker-item img{width:34px;height:34px;object-fit:contain;display:block;border-radius:4px}
    .picker-sticker-grid{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:6px;
    }
    .picker-sticker-item{
      display:flex;align-items:center;justify-content:center;
      border-radius:10px;padding:5px;cursor:pointer;
      transition:background .12s,transform .1s;
      border:1px solid transparent;aspect-ratio:1;
    }
    .picker-sticker-item:hover{
      background:rgba(100,175,245,0.18);border-color:rgba(100,175,245,0.35);
      transform:scale(1.05);
    }
    .picker-sticker-item img{width:60px;height:60px;object-fit:contain;display:block;border-radius:6px}
    .picker-loading{padding:24px;text-align:center;color:var(--text-light);font-size:11px}
    .picker-empty{padding:24px;text-align:center;color:var(--text-light);font-size:11px}
    /* inline emoji in posts */
    .post-emoji{height:20px;width:20px;object-fit:contain;vertical-align:middle;display:inline-block;margin:0 1px}
    /* sticker in posts */
    .post-sticker{max-width:140px;max-height:140px;display:block;margin-top:6px;border-radius:10px}
    .compose-footer-left{display:flex;gap:5px;align-items:center;overflow-x:auto;flex:1;min-width:0;scrollbar-width:none}
    .compose-footer-left::-webkit-scrollbar{display:none}
    .post-btn{
      padding:6px 18px;font-family:inherit;font-size:11.5px;font-weight:600;cursor:pointer;border-radius:14px;flex-shrink:0;
      background:linear-gradient(180deg,rgba(100,175,245,0.95) 0%,rgba(60,140,225,0.9) 49%,rgba(40,120,210,0.95) 50%,rgba(80,160,240,0.9) 100%);
      color:#fff;border:1px solid rgba(30,100,200,0.5);letter-spacing:.04em;
      box-shadow:0 2px 8px rgba(30,100,200,0.3),inset 0 1px 0 rgba(255,255,255,0.4);
      transition:all .15s;white-space:nowrap;
    }
    .post-btn:hover{box-shadow:0 3px 12px rgba(30,100,200,0.4),inset 0 1px 0 rgba(255,255,255,0.5)}

    /* POST */
    .post{
      margin:8px 12px 0;border-radius:10px;
      background:linear-gradient(180deg,rgba(255,255,255,0.5) 0%,rgba(210,232,255,0.35) 100%);
      border:1px solid rgba(255,255,255,0.8);border-bottom-color:rgba(140,195,240,0.35);
      box-shadow:0 2px 10px rgba(80,150,220,0.08),inset 0 1px 0 rgba(255,255,255,0.9);
      padding:14px 16px;backdrop-filter:blur(8px);
      animation:fadeUp .25s ease;
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .post-meta{display:flex;align-items:baseline;gap:10px;margin-bottom:7px}
    .post-user{font-weight:700;cursor:pointer;color:var(--aero-blue);font-size:13px;transition:color .1s}
    .post-user:hover{color:var(--aero-blue2);text-decoration:underline}
    .post-time{font-size:10.5px;color:var(--text-light)}
    .post-content{line-height:1.65;color:var(--text-dark);white-space:pre-wrap;word-break:break-word}
    .post-del{float:right;background:none;border:none;cursor:pointer;color:#aac8e0;font-size:17px;line-height:1;margin-left:8px;transition:color .15s}
    .post-del:hover{color:#c0392b}

    /* POST ACTIONS — like & comment */
    .post-actions{
      display:flex;align-items:center;gap:6px;margin-top:10px;
      padding-top:8px;border-top:1px solid rgba(140,195,240,0.2);
    }
    .action-btn{
      display:flex;align-items:center;gap:4px;
      background:none;border:none;cursor:pointer;font-family:inherit;
      font-size:11.5px;font-weight:600;color:var(--text-light);
      padding:4px 8px;border-radius:10px;transition:all .15s;
    }
    .action-btn:hover{background:rgba(100,175,245,0.12);color:var(--aero-blue)}
    .action-btn.liked{color:#e05080;}
    .action-btn.liked:hover{background:rgba(220,80,120,0.1);color:#c03060}
    .like-heart{font-size:14px;transition:transform .18s;}
    .action-btn.liked .like-heart{animation:heartPop .25s ease;}
    @keyframes heartPop{0%{transform:scale(1)}50%{transform:scale(1.45)}100%{transform:scale(1)}}
    .action-count{font-size:11px;min-width:10px}

    /* COMMENTS SECTION */
    .comments-section{
      margin-top:8px;padding-top:8px;
      border-top:1px solid rgba(140,195,240,0.18);
      animation:fadeUp .18s ease;
    }
    .comment{
      display:flex;gap:8px;margin-bottom:7px;align-items:flex-start;
    }
    .comment-avatar{
      width:24px;height:24px;border-radius:50%;flex-shrink:0;
      background:linear-gradient(135deg,rgba(120,185,245,0.9),rgba(50,130,220,0.85));
      border:1px solid rgba(255,255,255,0.8);
      display:flex;align-items:center;justify-content:center;
      font-size:10px;font-weight:700;color:#fff;overflow:hidden;
    }
    .comment-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
    .comment-body{flex:1;min-width:0;}
    .comment-meta{display:flex;align-items:baseline;gap:6px;margin-bottom:2px}
    .comment-user{
      font-size:11.5px;font-weight:700;color:var(--aero-blue);cursor:pointer;
    }
    .comment-user:hover{text-decoration:underline}
    .comment-time{font-size:10px;color:var(--text-light)}
    .comment-text{font-size:12px;color:var(--text-dark);line-height:1.5;word-break:break-word;white-space:pre-wrap}
    .comment-del{
      background:none;border:none;cursor:pointer;color:#c0d8e8;font-size:13px;
      padding:0 2px;line-height:1;transition:color .12s;margin-left:4px;flex-shrink:0;
    }
    .comment-del:hover{color:#c0392b}
    .comment-input-row{
      display:flex;gap:6px;margin-top:6px;align-items:center;
    }
    .comment-input{
      flex:1;padding:6px 10px;font-family:inherit;font-size:12px;border-radius:14px;
      background:rgba(220,238,255,0.5);border:1px solid rgba(140,195,240,0.5);
      color:var(--text-dark);outline:none;max-width:100%;width:100%;
      transition:border .12s,box-shadow .12s;
    }
    .comment-input:focus{border-color:rgba(60,140,220,0.7);box-shadow:0 0 0 2px rgba(80,160,240,0.14)}
    .comment-submit{
      padding:6px 12px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;
      border-radius:14px;border:1px solid rgba(30,100,200,0.4);color:#fff;
      background:linear-gradient(180deg,rgba(100,175,245,0.95) 0%,rgba(50,130,220,0.9) 100%);
      transition:all .12s;white-space:nowrap;flex-shrink:0;
    }
    .comment-submit:hover{box-shadow:0 2px 8px rgba(30,100,200,0.3)}
    .comments-load-more{
      font-size:11px;color:var(--aero-blue);cursor:pointer;background:none;border:none;
      font-family:inherit;padding:2px 0;font-weight:600;
    }
    .comments-load-more:hover{text-decoration:underline}
/* PROFILE — two-column layout */
.profile-layout{
  display:flex;flex-direction:row;align-items:flex-start;
  gap:10px;margin:12px 12px 0;
}
/* LEFT COLUMN — userbars */
.profile-left-col{
  flex-shrink:0;
  display:flex;flex-direction:column;gap:3px;
  padding:8px 6px;
  background:none;
  border-radius:8px;
  border:none;
  box-shadow:none;
  min-width:32px;
}
.profile-left-col:empty{display:none}
/* CENTER COLUMN — holds the card centered */
.profile-center-col{
  flex:1;display:flex;justify-content:center;
}
/* PROFILE CARD */
.profile-page{
  width:100%;max-width:360px;
  border-radius:14px;overflow:hidden;

  let ubs = input;
  if (typeof ubs === 'string') {
    try { ubs = JSON.parse(ubs); } catch { ubs = []; }
  }
  if (!Array.isArray(ubs)) return [];
  return ubs.map(u => ({
    img: String(u?.img || '').trim(),
    href: String(u?.href || '').trim(),
  })).filter(u => u.img).slice(0, 8);
}

function previewUserbar(i) {
  const img = document.getElementById(`ub${i}-img`)?.value.trim();
  const preview = document.getElementById(`ub${i}-preview`);
  if (!preview) return;
  preview.innerHTML = img ? `<img src="${escHtml(img)}" alt="preview">` : '';
}

function normalizeWidgets(input) {
  let widgets = input;
  if (typeof widgets === 'string') {
    try { widgets = JSON.parse(widgets); }
    catch { widgets = []; }
  }
  if (!Array.isArray(widgets)) return [];
  return widgets.map((w) => ({
    title: String(w?.title || '').trim(),
    image: String(w?.image || '').trim(),
    link: String(w?.link || '').trim(),
  })).filter(w => w.title || w.image || w.link).slice(0, 6);
}

function profileAccent(user) {
  const accent = String(user?.accent_color || '').trim();
  return accent || '#5a9fd4';
}

function applyProfileMedia(root) {
  root.querySelectorAll('[data-profile-bg]').forEach((el) => {
    const bg = String(el.dataset.profileBg || '').trim();
    if (bg) {
      document.body.style.backgroundImage = `url("${bg}")`;
      document.body.style.backgroundSize = 'cover';
      document.body.style.backgroundPosition = 'center center';
      document.body.style.backgroundAttachment = 'fixed';
    }
  });
}

async function verifyToken() {
  if (!token) return;
  const d = await api('GET', '/api/me');
  if (d.error) {
    token = null;
    me = null;
    localStorage.clear();
  } else {
    me = d;
    localStorage.setItem('me', JSON.stringify(me));
  }
}

function render() {
  document.body.style.backgroundImage = '';
  const app = document.getElementById('app');
  if (!token) { app.innerHTML = renderAuth(); return bindAuth(); }
  app.innerHTML = renderShell();
  if (view === 'feed') loadFeed();
  else if (view === 'explore') loadExplore();
  else if (view === 'profile' && profileUser) loadProfile(profileUser);
  else if (view === 'settings') renderSettings();
}

    return `<div class="auth">

function showRegister() {
  document.getElementById('app').innerHTML = renderAuth('register');
  document.getElementById('rp2').addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
}

function showLogin() {
  document.getElementById('app').innerHTML = renderAuth('login');
  bindAuth();
}

function bindAuth() {
  document.getElementById('p').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
}

async function doLogin() {
  const el = $('#aerr');
  const d = await api('POST', '/api/login', { username: $('#u').value.trim(), password: $('#p').value });
  if (d.error) { el.textContent = d.error; el.style.display = 'block'; return; }
  token = d.token; me = d.user;
  localStorage.setItem('token', token); localStorage.setItem('me', JSON.stringify(me));
  render();
}

async function doRegister() {
  const el = $('#aerr');
  const username = ($('#ru') || $('#u'))?.value.trim();
  const password = ($('#rp') || $('#p'))?.value;
  const confirm = $('#rp2')?.value;
  if (confirm !== undefined && password !== confirm) { el.textContent = 'Passwords do not match.'; el.style.display = 'block'; return; }
  if (!username) { el.textContent = 'Please enter a username.'; el.style.display = 'block'; return; }
  if (!password) { el.textContent = 'Please enter a password.'; el.style.display = 'block'; return; }
  const d = await api('POST', '/api/register', { username, password });
  if (d.error) { el.textContent = d.error; el.style.display = 'block'; return; }
  token = d.token; me = d.user;
  localStorage.setItem('token', token); localStorage.setItem('me', JSON.stringify(me));
  render();
}

function getInitial(name) { return name ? name[0].toUpperCase() : '?'; }

async function searchUsers(q) {
  if (!q.trim()) {
    const posts = await api('GET', '/api/explore');
    document.getElementById('results').innerHTML = posts.length
      ? posts.map(renderPost).join('')
      : `<div class="empty">No posts yet.</div>`;
    return;
  }
  const users = await api('GET', '/api/search?q=' + encodeURIComponent(q));
  document.getElementById('results').innerHTML = users.length
    ? users.map(u => `<div class="user-row" onclick="goto('profile','${escHtml(u.username)}')">
        <div><div class="user-name">${escHtml(u.username)}</div><div class="user-bio">${escHtml(u.bio || '')}</div></div>
      </div>`).join('')
    : `<div class="empty">No users found.</div>`;

function profileWidgetsMarkup(widgets) {

        ${w.link ? `<div class="profile-widget-link">${escHtml(w.link)}</div>` : ''}`;

        ? `<a class="profile-widget" href="${escHtml(w.link)}" target="_blank" rel="noopener noreferrer">${card}</a>`

function applyWidgetImages(root) {

async function saveProfile() {
  const widgets = [];
  for (let i = 0; i < 4; i++) {
    const title = document.getElementById(`w${i}-title`).value.trim();
    const image = document.getElementById(`w${i}-image`).value.trim();
    const link = document.getElementById(`w${i}-link`).value.trim();
    if (title || image || link) widgets.push({ title, image, link });
  }

  const userbars = [];
  for (let i = 0; i < 8; i++) {
    const img = document.getElementById(`ub${i}-img`).value.trim();
    const href = document.getElementById(`ub${i}-href`).value.trim();
    if (img) userbars.push({ img, href });
  }

  const payload = {
    bio: document.getElementById('bio-in').value,
    avatar_url: document.getElementById('avatar-in').value.trim(),
    profile_background: document.getElementById('bg-in').value.trim(),
    accent_color: document.getElementById('accent-in').value.trim(),
    profile_widgets: widgets,
    userbars,
  };

  const d = await api('PATCH', '/api/me', payload);
  if (d.error) return;
  me = d.user;
  localStorage.setItem('me', JSON.stringify(me));
  if (view === 'profile') loadProfile(me.username);
}

function renderPost(p) {
  const del = p.user_id === me?.id
    ? `<button class="post-del" onclick="delPost(${p.id},this)" title="Delete">×</button>`
    : '';
  let media = '';
  if (p.media_url) {
    if (p.media_type === 'video/mp4') {
      media = `<div class="post-media"><video src="${p.media_url}" controls preload="metadata" style="max-height:360px"></video></div>`;
    } else if (p.is_sticker) {
      media = `<div class="post-media"><img class="post-sticker" src="${p.media_url}" alt="sticker" loading="lazy"></div>`;
    } else {
      media = `<div class="post-media"><img src="${p.media_url}" alt="media" loading="lazy"></div>`;
    }
  }
  const contentHtml = p.content ? `<div class="post-content">${renderEmojiText(p.content)}</div>` : '';
  const liked = p.liked || false;
  const likeCount = p.like_count || 0;
  const commentCount = p.comment_count || 0;
  return `<div class="post" id="post-${p.id}">
    ${del}
    <div class="post-meta">
      <span class="post-user" onclick="goto('profile','${escHtml(p.username)}')">${escHtml(p.username)}</span>
      <span class="post-time">${timeAgo(p.created_at)}</span>
    </div>
    ${contentHtml}
    ${media}
    <div class="post-actions">
      <button class="action-btn ${liked ? 'liked' : ''}" id="like-btn-${p.id}" onclick="toggleLike(${p.id})">
        <span class="like-heart">${liked ? '❤️' : '🤍'}</span>
        <span class="action-count" id="like-count-${p.id}">${likeCount > 0 ? likeCount : ''}</span>
      </button>
      <button class="action-btn" onclick="toggleComments(${p.id})">
        <span>💬</span>
        <span class="action-count" id="comment-count-${p.id}">${commentCount > 0 ? commentCount : ''}</span>
      </button>
    </div>
    <div class="comments-section" id="comments-${p.id}" style="display:none"></div>
  </div>`;
}

// ── LIKES ─────────────────────────────────────────────────────
async function toggleLike(postId) {
  const btn = document.getElementById(`like-btn-${postId}`);
  const countEl = document.getElementById(`like-count-${postId}`);
  const isLiked = btn.classList.contains('liked');
  // Optimistic UI
  btn.classList.toggle('liked', !isLiked);
  btn.querySelector('.like-heart').textContent = isLiked ? '🤍' : '❤️';
  const d = await api('POST', `/api/posts/${postId}/like`);
  if (d.error) {
    // Revert on error
    btn.classList.toggle('liked', isLiked);
    btn.querySelector('.like-heart').textContent = isLiked ? '❤️' : '🤍';
    return;
  }
  btn.classList.toggle('liked', d.liked);
  btn.querySelector('.like-heart').textContent = d.liked ? '❤️' : '🤍';
  countEl.textContent = d.like_count > 0 ? d.like_count : '';
}

// ── COMMENTS ──────────────────────────────────────────────────
const _commentsOpen = new Set();
const COMMENTS_PAGE = 3; // how many to show initially

async function toggleComments(postId) {
  const section = document.getElementById(`comments-${postId}`);
  if (!section) return;
  if (_commentsOpen.has(postId)) {
    _commentsOpen.delete(postId);
    section.style.display = 'none';
    section.innerHTML = '';
  } else {
    _commentsOpen.add(postId);
    section.style.display = 'block';
    await loadComments(postId);
  }
}

async function loadComments(postId) {
  const section = document.getElementById(`comments-${postId}`);
  if (!section) return;
  section.innerHTML = `<div style="font-size:11px;color:var(--text-light);padding:4px 0">Loading…</div>`;
  // Refresh me to get latest avatar
  try { const fresh = await api('GET', '/api/me'); if (fresh && !fresh.error) me = fresh; } catch {}
  const comments = await api('GET', `/api/posts/${postId}/comments`);
  if (!Array.isArray(comments)) { section.innerHTML = ''; return; }
  renderComments(postId, comments);
}

function renderComments(postId, comments) {
  const section = document.getElementById(`comments-${postId}`);
  if (!section) return;
  const countEl = document.getElementById(`comment-count-${postId}`);
  if (countEl) countEl.textContent = comments.length > 0 ? comments.length : '';

  const visible = comments.slice(0, COMMENTS_PAGE);
  const hidden  = comments.slice(COMMENTS_PAGE);

  // Current user avatar — always fresh from me object
  const myAvatar = me?.avatar_url
    ? `<img src="${escHtml(me.avatar_url)}" alt="">`
    : getInitial(me?.username);

  const showMoreBtn = hidden.length > 0
    ? `<button class="comments-load-more" id="show-more-${postId}" onclick="showMoreComments(${postId})">
        ↓ Show ${hidden.length} more comment${hidden.length > 1 ? 's' : ''}
       </button>`
    : '';

  section.innerHTML = `
    <div id="comment-list-${postId}">
      ${visible.length ? visible.map(c => renderComment(postId, c)).join('') : `<div style="font-size:11px;color:var(--text-light);padding:2px 0 6px">No comments yet</div>`}
    </div>
    ${showMoreBtn}
    <div class="comment-input-row">
      <div class="comment-avatar" id="my-avatar-${postId}">${myAvatar}</div>
      <input class="comment-input" id="comment-input-${postId}" placeholder="Add a comment…" maxlength="500"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submitComment(${postId})}">
      <button class="comment-submit" onclick="submitComment(${postId})">Send</button>
    </div>`;

  // Store hidden comments on the section element for show more
  section._hiddenComments = hidden;
  section._postId = postId;
}

function showMoreComments(postId) {
  const section = document.getElementById(`comments-${postId}`);
  if (!section || !section._hiddenComments) return;
  const list = document.getElementById(`comment-list-${postId}`);
  section._hiddenComments.forEach(c => {
    list.insertAdjacentHTML('beforeend', renderComment(postId, c));
  });
  section._hiddenComments = [];
  document.getElementById(`show-more-${postId}`)?.remove();
}

function renderComment(postId, c) {
  const canDel = c.user_id === me?.id;
  const avatar = c.avatar_url
    ? `<img src="${escHtml(c.avatar_url)}" alt="">`
    : getInitial(c.username);
  return `<div class="comment" id="comment-item-${c.id}">
    <div class="comment-avatar">${avatar}</div>
    <div class="comment-body">
      <div class="comment-meta">
        <span class="comment-user" onclick="goto('profile','${escHtml(c.username)}')">${escHtml(c.username)}</span>
        <span class="comment-time">${timeAgo(c.created_at)}</span>
        ${canDel ? `<button class="comment-del" onclick="deleteComment(${postId},${c.id})" title="Delete">×</button>` : ''}
      </div>
      <div class="comment-text">${renderEmojiText(c.content)}</div>
    </div>
  </div>`;
}

async function submitComment(postId) {
  const input = document.getElementById(`comment-input-${postId}`);
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  const c = await api('POST', `/api/posts/${postId}/comments`, { content: text });
  if (c.error) { input.value = text; return; }
  const list = document.getElementById(`comment-list-${postId}`);
  if (list) {
    // Remove "no comments" placeholder if present
    const placeholder = list.querySelector('div');
    if (placeholder && !placeholder.id) placeholder.remove();
    list.insertAdjacentHTML('beforeend', renderComment(postId, c));
  }
  // Update counter
  const countEl = document.getElementById(`comment-count-${postId}`);
  if (countEl) {
    const cur = parseInt(countEl.textContent) || 0;
    countEl.textContent = cur + 1;
  }
  // Also update my avatar in input row in case it just loaded
  const myAvatarEl = document.getElementById(`my-avatar-${postId}`);
  if (myAvatarEl && me?.avatar_url) {
    myAvatarEl.innerHTML = `<img src="${escHtml(me.avatar_url)}" alt="">`;
  }
  registerActivity();
}

async function deleteComment(postId, commentId) {
  await api('DELETE', `/api/comments/${commentId}`);
  document.getElementById(`comment-item-${commentId}`)?.remove();
  const countEl = document.getElementById(`comment-count-${postId}`);
  if (countEl) {
    const cur = parseInt(countEl.textContent) || 1;
    countEl.textContent = cur - 1 > 0 ? cur - 1 : '';
  }
}

let _pendingMedia = null; // { dataUrl, type }

function handleMediaFile(input) {
  const file = input.files[0];
  const err = document.getElementById('media-err');
  err.textContent = '';
  if (!file) return;

  const MAX = 25 * 1024 * 1024;
  if (file.size > MAX) { err.textContent = 'File too large (max 25 MB)'; input.value=''; return; }

  const ALLOWED = ['image/png','image/jpeg','image/gif','video/mp4'];
  if (!ALLOWED.includes(file.type)) { err.textContent = 'Only PNG, JPG, GIF, MP4 allowed'; input.value=''; return; }

  const reader = new FileReader();
  reader.onload = e => {
    if (file.type === 'video/mp4') {
      // Check duration via a temp video element
      const vid = document.createElement('video');
      vid.preload = 'metadata';
      vid.onloadedmetadata = () => {
        URL.revokeObjectURL(vid.src);
        if (vid.duration > 180) {
          err.textContent = 'Video too long (max 3 minutes)';
          input.value = '';
          return;
        }
        _pendingMedia = { dataUrl: e.target.result, type: file.type };
        showMediaPreview(file.type, e.target.result);
      };
      vid.src = URL.createObjectURL(file);
    } else {
      _pendingMedia = { dataUrl: e.target.result, type: file.type };
      showMediaPreview(file.type, e.target.result);
    }
  };
  reader.readAsDataURL(file);
}

function showMediaPreview(type, src) {
  const wrap = document.getElementById('media-preview-wrap');
  const preview = document.getElementById('media-preview');
  if (type === 'video/mp4') {
    preview.innerHTML = `<video src="${src}" controls style="max-height:200px;border-radius:8px;max-width:100%"></video>`;
  } else {
    preview.innerHTML = `<img src="${src}" style="max-height:${_pendingMedia?.isSticker ? '100px' : '200px'};border-radius:8px;max-width:100%">`;
  }
  wrap.style.display = 'inline-block';
}

function clearMedia() {
  _pendingMedia = null;
  document.getElementById('media-preview-wrap').style.display = 'none';
  document.getElementById('media-preview').innerHTML = '';
  document.getElementById('media-file').value = '';
  document.getElementById('media-err').textContent = '';
}

// ── EMOJI / STICKER PICKER ────────────────────────────────────
const GITHUB_API_BASE = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents`;
const RAW_BASE = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}`;

let _pickerCache = { emoji: null, sticker: null }; // null = not loaded, [] = loaded
let _pickerOpen = null; // 'emoji' | 'sticker' | null

const IMAGE_EXTS = new Set(['png','gif','jpg','jpeg','webp']);

function pickerFileUrl(folder, filename) {
  return `${RAW_BASE}/${folder}/${encodeURIComponent(filename)}`;
}

async function fetchPickerFiles(folder) {
  if (_pickerCache[folder]) return _pickerCache[folder];
  try {
    const r = await fetch(`${GITHUB_API_BASE}/${folder}?ref=${GITHUB_BRANCH}`, {
      headers: { Accept: 'application/vnd.github+json' }
    });
    if (!r.ok) { _pickerCache[folder] = []; return []; }
    const data = await r.json();
    const files = (Array.isArray(data) ? data : [])
      .filter(f => f.type === 'file' && IMAGE_EXTS.has(f.name.split('.').pop().toLowerCase()))
      .map(f => f.name);
    _pickerCache[folder] = files;
    return files;
  } catch { _pickerCache[folder] = []; return []; }
}

function emojiTag(filename) {
  // strip extension for the tag name
  return ':' + filename.replace(/\.[^.]+$/, '') + ':';
}

function renderPickerGrid(folder, files, mode) {
  const body = document.getElementById('picker-body');
  if (!files.length) {
    body.innerHTML = `<div class="picker-empty">No ${mode}s found in /${folder}/</div>`;
    return;
  }
  if (mode === 'emoji') {
    body.innerHTML = `<div class="picker-grid">${files.map(f => {
      const url = pickerFileUrl(folder, f);
      const tag = emojiTag(f);
      return `<div class="picker-item" title="${tag}" onclick="insertEmoji('${tag}')"><img src="${url}" alt="${tag}" loading="lazy"></div>`;
    }).join('')}</div>`;
  } else {
    body.innerHTML = `<div class="picker-sticker-grid">${files.map(f => {
      const url = pickerFileUrl(folder, f);
      return `<div class="picker-sticker-item" title="${f}" onclick="insertSticker('${url}', '${f}')"><img src="${url}" alt="${f}" loading="lazy"></div>`;
    }).join('')}</div>`;
  }
}

async function openPicker(mode) {
  const popup = document.getElementById('picker-popup');
  const body = document.getElementById('picker-body');
  const tabs = document.getElementById('picker-tabs');

  // Tabs
  tabs.innerHTML = `
    <button class="picker-tab ${mode==='emoji'?'active':''}" onclick="switchPickerTab('emoji')">😊 Emoji</button>
    <button class="picker-tab ${mode==='sticker'?'active':''}" onclick="switchPickerTab('sticker')">🎨 Stickers</button>`;

  body.innerHTML = `<div class="picker-loading">Loading…</div>`;
  popup.style.display = 'flex';

  const files = await fetchPickerFiles(mode);
  renderPickerGrid(mode, files, mode);
}

async function switchPickerTab(mode) {
  _pickerOpen = mode;
  document.querySelectorAll('.picker-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.picker-tab')[mode === 'emoji' ? 0 : 1]?.classList.add('active');
  document.getElementById('emoji-btn')?.classList.toggle('active', mode === 'emoji');
  document.getElementById('sticker-btn')?.classList.toggle('active', mode === 'sticker');
  const triggerBtn = document.getElementById(mode === 'emoji' ? 'emoji-btn' : 'sticker-btn');
  positionPicker(triggerBtn);
  const body = document.getElementById('picker-body');
  body.innerHTML = `<div class="picker-loading">Loading…</div>`;
  const files = await fetchPickerFiles(mode);
  renderPickerGrid(mode, files, mode);
}

function positionPicker(triggerBtn) {
  const popup = document.getElementById('picker-popup');
  const rect = triggerBtn.getBoundingClientRect();
  const popupW = 300;
  const popupH = 320;
  const margin = 6;
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  // Prefer opening downward; if not enough space, open upward
  let top, left;
  if (rect.bottom + popupH + margin <= vh) {
    top = rect.bottom + margin;
  } else {
    top = rect.top - popupH - margin;
  }
  // Align left with button, clamp to viewport
  left = rect.left;
  if (left + popupW > vw - 8) left = vw - popupW - 8;
  if (left < 8) left = 8;

  popup.style.top = top + 'px';
  popup.style.left = left + 'px';
  popup.style.width = popupW + 'px';
}

function togglePicker(mode) {
  const popup = document.getElementById('picker-popup');
  const triggerBtn = document.getElementById(mode === 'emoji' ? 'emoji-btn' : 'sticker-btn');
  if (_pickerOpen === mode && popup.style.display !== 'none') {
    closePicker(); return;
  }
  _pickerOpen = mode;
  document.getElementById('emoji-btn')?.classList.toggle('active', mode === 'emoji');
  document.getElementById('sticker-btn')?.classList.toggle('active', mode === 'sticker');
  popup.style.display = 'flex';
  positionPicker(triggerBtn);
  openPicker(mode);
}

function closePicker() {
  _pickerOpen = null;
  const popup = document.getElementById('picker-popup');
  if (popup) popup.style.display = 'none';
  document.getElementById('emoji-btn')?.classList.remove('active');
  document.getElementById('sticker-btn')?.classList.remove('active');
}

// Close picker when clicking outside
document.addEventListener('click', (e) => {
  if (!_pickerOpen) return;
  const popup = document.getElementById('picker-popup');
  if (!popup) return;
  const emojiBtn = document.getElementById('emoji-btn');
  const stickerBtn = document.getElementById('sticker-btn');
  if (!popup.contains(e.target) && e.target !== emojiBtn && e.target !== stickerBtn
      && !emojiBtn?.contains(e.target) && !stickerBtn?.contains(e.target)) {
    closePicker();
  }
});

function insertEmoji(tag) {
  const ta = document.getElementById('ta');
  if (!ta) return;
  const start = ta.selectionStart, end = ta.selectionEnd;
  ta.value = ta.value.slice(0, start) + tag + ta.value.slice(end);
  ta.selectionStart = ta.selectionEnd = start + tag.length;
  ta.focus();
}

function insertSticker(url, filename) {
  // Stickers post as media_url (image) immediately when user clicks Post
  _pendingMedia = { dataUrl: url, type: 'image/gif', isSticker: true, filename };
  showMediaPreview('image/gif', url);
  closePicker();
}

// Render :emoji_name: tags in post text as inline images
function renderEmojiText(text) {
  return escHtml(text).replace(/:([a-zA-Z0-9_\-]+):/g, (match, name) => {
    const url = `${RAW_BASE}/emoji/${encodeURIComponent(name)}.gif`;
    const urlPng = `${RAW_BASE}/emoji/${encodeURIComponent(name)}.png`;
    // Try gif first, fallback to png via onerror
    return `<img class="post-emoji" src="${url}" alt="${match}" title="${match}" onerror="this.src='${urlPng}';this.onerror=null">`;
  });
}


let _timeoutState = null; // { expiresAt: Date, reason: string } or null
let _timeoutInterval = null;

function formatTimeLeft(expiresAt) {
  const secs = Math.max(0, Math.ceil((new Date(expiresAt) - Date.now()) / 1000));
  if (secs <= 0) return '0s';
  const m = Math.floor(secs / 60), s = secs % 60;
  return m > 0 ? `${m}m ${s}s` : `${s}s`;
}

function renderTimeoutBanner(expiresAt, reason) {
  const existing = document.getElementById('timeout-banner');
  const msg = reason ? `Reason: ${escHtml(reason)}` : 'Please wait before posting again.';
  const html = `<div class="timeout-banner" id="timeout-banner">
    <div class="timeout-icon">⏳</div>
    <div class="timeout-text">
      <strong>You are timed out — <span id="timeout-countdown">${formatTimeLeft(expiresAt)}</span> remaining</strong>
      <span>${msg}</span>
    </div>
  </div>`;
  if (existing) { existing.outerHTML = html; }
  else {
    const compose = document.querySelector('.compose');
    if (compose) { compose.insertAdjacentHTML('beforebegin', html); compose.classList.add('timeout-compose-block'); }
  }
}

function clearTimeoutBanner() {
  document.getElementById('timeout-banner')?.remove();
  document.querySelector('.compose')?.classList.remove('timeout-compose-block');
}

async function pollTimeoutStatus() {
  try {
    const d = await api('GET', '/api/me/timeout');
    if (d.timedOut) {
      _timeoutState = { expiresAt: d.expiresAt, reason: d.reason };
      renderTimeoutBanner(d.expiresAt, d.reason);
    } else {
      _timeoutState = null;
      clearTimeoutBanner();
    }
  } catch {}
}

function startTimeoutPoller() {
  if (_timeoutInterval) clearInterval(_timeoutInterval);
  // Countdown tick every second
  _timeoutInterval = setInterval(() => {
    const cd = document.getElementById('timeout-countdown');
    if (_timeoutState && cd) {
      const left = formatTimeLeft(_timeoutState.expiresAt);
      cd.textContent = left;
      if (new Date(_timeoutState.expiresAt) <= Date.now()) {
        pollTimeoutStatus(); // re-check with server
      }
    }
  }, 1000);
  // Re-sync with server every 15s
  setInterval(pollTimeoutStatus, 15000);
}

async function submitPost() {
  if (_timeoutState && new Date(_timeoutState.expiresAt) > Date.now()) {
    renderTimeoutBanner(_timeoutState.expiresAt, _timeoutState.reason);
    return;
  }
  const ta = document.getElementById('ta');
  if (!ta.value.trim() && !_pendingMedia) return;
  const btn = document.querySelector('.post-btn');
  btn.disabled = true; btn.textContent = 'Posting…';
  const body = { content: ta.value };
  if (_pendingMedia) {
    if (_pendingMedia.isSticker) {
      // Stickers are remote URLs, not base64 — send directly, flag as sticker
      body.media_url = _pendingMedia.dataUrl;
      body.media_type = 'image/gif';
      body.is_sticker = true;
    } else {
      body.media_url = _pendingMedia.dataUrl;
      body.media_type = _pendingMedia.type;
    }
  }
  const post = await api('POST', '/api/posts', body);
  btn.disabled = false; btn.textContent = 'Post';
  if (post.error === 'timeout') {
    _timeoutState = { expiresAt: post.expiresAt, reason: post.reason };
    renderTimeoutBanner(post.expiresAt, post.reason);
    return;
  }
  if (post.error) return;
  ta.value = '';
  clearMedia();
  document.getElementById('posts').insertAdjacentHTML('afterbegin', renderPost(post));
  registerActivity();
}

async function delPost(id) {
  await api('DELETE', '/api/posts/' + id);
  document.getElementById('post-' + id)?.remove();
}

function logout() {
  stopOnlinePresence();
  token = null; me = null;
  localStorage.removeItem('token'); localStorage.removeItem('me');
  render();
}

// ── AERO POINTS ───────────────────────────────────────────────
let _aeroPoints = 0;

async function fetchPoints() {
  try {
    const d = await api('GET', '/api/me/points');
    if (typeof d.aero_points === 'number') {
      _aeroPoints = d.aero_points;
      _activityCount = d.activity_count ?? 0;
      updatePointsDisplay();
    }
  } catch {}
}

function updatePointsDisplay(flash) {
  const el = document.getElementById('snews-pts-val');
  if (!el) return;
  el.textContent = _aeroPoints;
  if (flash) {
    el.style.transition = 'transform .15s,opacity .15s';
    el.style.transform = 'scale(1.35)';
    el.style.opacity = '0.7';
    setTimeout(() => { el.style.transform = 'scale(1)'; el.style.opacity = '1'; }, 160);
  }
}

// Track activity locally to award points instantly without a round-trip
let _activityCount = 0;
function registerActivity() {
  _activityCount++;
  if (_activityCount % 2 === 0) {
    _aeroPoints++;
    updatePointsDisplay(true);
  }
}

// kept for any legacy call — now a no-op div
function renderAeroPointsBar() { return ''; }

// ── NEWS SIDEBAR ──────────────────────────────────────────────
let _newsItems = [];
let _newsIndex = 0;
let _newsRotateInterval = null;

function stopNewsRotation() {
  if (_newsRotateInterval) { clearInterval(_newsRotateInterval); _newsRotateInterval = null; }
}

function startNewsRotation() {
  stopNewsRotation();
  if (_newsItems.length <= 1) return;
  _newsRotateInterval = setInterval(() => {
    _newsIndex = (_newsIndex + 1) % _newsItems.length;
    renderSidebarNewsItem();
  }, 25000);
}

function renderSidebarNewsItem() {
  const body = document.getElementById('snews-body');
  if (!body) return;
  const item = _newsItems[_newsIndex];
  if (!item) return;
  const dotsHtml = _newsItems.length > 1
    ? `<div class="snews-dots">${_newsItems.map((_, i) =>
        `<div class="snews-dot ${i === _newsIndex ? 'active' : ''}" onclick="jumpNewsItem(${i})"></div>`
      ).join('')}</div>`
    : '';
  body.innerHTML = `<div class="snews-item">
    <div class="snews-item-user" onclick="goto('profile','${escHtml(item.username)}')" title="${escHtml(item.username)}">${escHtml(item.username)}</div>
    <div class="snews-item-text">${escHtml(item.content)}</div>
    <div class="snews-item-time">${timeAgo(item.created_at)}</div>
    ${dotsHtml}
  </div>`;
}

function jumpNewsItem(i) {
  _newsIndex = i;
  renderSidebarNewsItem();
  startNewsRotation();
}

async function loadNewsSidebar() {
  const sidebar = document.getElementById('news-sidebar');
  if (!sidebar) return;

  const news = await api('GET', '/api/news');
  if (Array.isArray(news)) _newsItems = news;
  _newsIndex = 0;

  const hint = _aeroPoints >= 10 ? '✨ Ready to send News!' : `${10 - _aeroPoints} more to send News`;

  sidebar.innerHTML = `
    <div class="online-panel" id="online-panel">
      <div class="online-header">
        <span style="font-size:11px">🟢</span>
        <span class="online-title">Online</span>
        <span class="online-count" id="online-count">…</span>
      </div>
      <div class="online-body" id="online-body"><div class="online-empty">Loading…</div></div>
    </div>

    <div class="snews-points">
      <div class="snews-points-label">⭐ Aero-Points</div>
      <div class="snews-points-val" id="snews-pts-val">${_aeroPoints}</div>
    </div>

    <div class="snews-wrap">
      <div class="snews-header">
        <span style="font-size:13px">📰</span>
        <span class="snews-title">News</span>
        <span class="snews-count">${_newsItems.length}</span>
      </div>
      <div class="snews-body" id="snews-body">
        ${_newsItems.length === 0 ? `<div class="snews-empty">No news yet</div>` : ''}
      </div>
    </div>

    <div class="snews-compose">
      <div class="snews-compose-label">
        Send News <span class="snews-compose-cost">⭐10</span>
      </div>
      <textarea id="snews-ta" placeholder="Write news… (max 456 chars)" maxlength="456"
        oninput="updateSnewsChar()"></textarea>
      <div class="snews-compose-footer">
        <span class="snews-char" id="snews-char">0 / 456</span>
        <button class="snews-send-btn" onclick="submitSidebarNews()">Send</button>
      </div>
      <div class="snews-err" id="snews-err"></div>
    </div>`;

  if (_newsItems.length > 0) {
    renderSidebarNewsItem();
    startNewsRotation();
  }
}

function updateSnewsChar() {
  const ta = document.getElementById('snews-ta');
  const el = document.getElementById('snews-char');
  if (!ta || !el) return;
  const len = ta.value.length;
  el.textContent = `${len} / 456`;
  el.classList.toggle('warn', len > 400);
}

async function submitSidebarNews() {
  const ta = document.getElementById('snews-ta');
  const err = document.getElementById('snews-err');
  if (!ta) return;
  const text = ta.value.trim();
  if (!text) { err.textContent = 'Write something first.'; return; }
  if (_aeroPoints < 10) { err.textContent = `Need ${10 - _aeroPoints} more points.`; return; }
  err.textContent = '';
  const btn = document.querySelector('.snews-send-btn');
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  const d = await api('POST', '/api/news', { content: text });
  if (btn) { btn.disabled = false; btn.textContent = 'Send'; }
  if (d.error) { err.textContent = d.error; return; }
  ta.value = '';
  updateSnewsChar();
  _aeroPoints -= 10;
  loadNewsSidebar();
}

// ── ONLINE PRESENCE ──────────────────────────────────────────
let _onlinePingInterval = null;
let _onlinePollInterval = null;

function startOnlinePresence() {
  // Ping immediately, then every 30s
  api('POST', '/api/online/ping').catch(() => {});
  if (_onlinePingInterval) clearInterval(_onlinePingInterval);
  _onlinePingInterval = setInterval(() => {
    api('POST', '/api/online/ping').catch(() => {});
  }, 30000);

  // Poll online users every 15s
  fetchOnlineUsers();
  if (_onlinePollInterval) clearInterval(_onlinePollInterval);
  _onlinePollInterval = setInterval(fetchOnlineUsers, 15000);

  // Remove from online on page close
  window.addEventListener('beforeunload', () => {
    navigator.sendBeacon && navigator.sendBeacon('/api/online/ping', null);
    api('DELETE', '/api/online/ping').catch(() => {});
  });
}

function stopOnlinePresence() {
  if (_onlinePingInterval) { clearInterval(_onlinePingInterval); _onlinePingInterval = null; }
  if (_onlinePollInterval) { clearInterval(_onlinePollInterval); _onlinePollInterval = null; }
  if (token) api('DELETE', '/api/online/ping').catch(() => {});
}

async function fetchOnlineUsers() {
  try {
    const users = await api('GET', '/api/online/users');
    renderOnlinePanel(Array.isArray(users) ? users : []);
  } catch {}
}

function renderOnlinePanel(users) {
  const body = document.getElementById('online-body');
  const countEl = document.getElementById('online-count');
  if (!body) return;
  if (countEl) countEl.textContent = users.length;
  if (!users.length) {
    body.innerHTML = `<div class="online-empty">No one online</div>`;
    return;
  }
  body.innerHTML = users.map(u =>
    `<div class="online-user" onclick="goto('profile','${escHtml(u.username)}')">
      <div class="online-dot${u.isMe ? ' me' : ''}"></div>
      <span class="online-name${u.isMe ? ' me' : ''}">${escHtml(u.username)}${u.isMe ? ' (you)' : ''}</span>
    </div>`
  ).join('');
}

verifyToken().then(render);
