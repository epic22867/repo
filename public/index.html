<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Aero World</title>
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600;700&family=Trebuchet+MS&display=swap" rel="stylesheet">
  <style>
    *{margin:0;box-sizing:border-box}
    :root{
      --sky1:#c8dff5;--sky2:#a0c4e8;--sky3:#6aaad4;
      --glass-bg:rgba(255,255,255,0.35);
      --glass-border:rgba(255,255,255,0.75);
      --glass-shadow:rgba(100,160,220,0.25);
      --aero-blue:#1e6bbf;--aero-blue2:#3a8ee6;
      --text-dark:#1a2a3a;--text-mid:#3a5070;--text-light:#5a7090;
    }
    body{
      font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
      background:linear-gradient(160deg,#b8d8f5 0%,#d0e8f8 30%,#e8f3fc 55%,#cce0f5 80%,#a8cce8 100%);
      min-height:100vh;color:var(--text-dark);font-size:13px;
      background-attachment:fixed;
    }
    #app{max-width:540px;margin:0 auto;padding:0 0 80px}
    #app:has(.two-col-layout){max-width:760px}

    /* NAV */
    nav{
      position:fixed;top:0;left:0;right:0;z-index:99;height:50px;
      background:linear-gradient(180deg,rgba(180,220,255,0.85) 0%,rgba(140,195,245,0.7) 45%,rgba(100,165,230,0.75) 50%,rgba(140,195,248,0.65) 100%);
      border-bottom:1px solid rgba(255,255,255,0.6);
      box-shadow:0 2px 16px rgba(50,120,200,0.3),inset 0 1px 0 rgba(255,255,255,0.95);
      backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
      display:flex;align-items:center;padding:0 10px 0 14px;gap:6px;overflow:hidden;
    }
    .logo{
      font-size:18px;font-weight:700;letter-spacing:.05em;
      background:linear-gradient(180deg,#fff 0%,#b0d8f8 50%,#5a9fd4 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      text-shadow:none;filter:drop-shadow(0 1px 2px rgba(30,80,160,0.4));
      display:flex;align-items:center;flex-shrink:0;
    }
    .nav-links{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;flex:1;min-width:0}
    .nav-links::-webkit-scrollbar{display:none}
    .nav-links button{
      background:linear-gradient(180deg,rgba(255,255,255,0.7) 0%,rgba(190,225,255,0.5) 100%);
      border:1px solid rgba(255,255,255,0.8);border-bottom-color:rgba(140,190,240,0.5);
      border-radius:14px;cursor:pointer;color:var(--text-dark);font-family:inherit;
      font-size:11.5px;font-weight:600;padding:4px 10px;white-space:nowrap;flex-shrink:0;
      box-shadow:0 1px 4px rgba(80,140,200,0.15),inset 0 1px 0 rgba(255,255,255,0.9);
      transition:all .15s;letter-spacing:.02em;
    }
    .nav-links button:hover{background:linear-gradient(180deg,rgba(255,255,255,0.9) 0%,rgba(210,235,255,0.7) 100%)}
    .nav-links button.active{
      background:linear-gradient(180deg,rgba(100,170,240,0.9) 0%,rgba(50,120,210,0.85) 50%,rgba(80,150,230,0.8) 100%);
      color:#fff;border-color:rgba(30,100,200,0.5);
      box-shadow:0 1px 6px rgba(30,100,200,0.35),inset 0 1px 0 rgba(255,255,255,0.35),inset 0 -1px 0 rgba(0,60,150,0.2);
    }
    .main{padding-top:66px}

    /* AUTH */
    .auth{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;gap:10px}
    .auth-panel{
      width:100%;max-width:320px;padding:28px 24px;
      background:linear-gradient(180deg,rgba(255,255,255,0.6) 0%,rgba(210,235,255,0.45) 50%,rgba(185,220,250,0.5) 100%);
      border:1px solid rgba(255,255,255,0.85);border-bottom-color:rgba(140,195,240,0.5);
      border-radius:10px;
      box-shadow:0 8px 32px rgba(60,130,210,0.2),inset 0 1px 0 rgba(255,255,255,0.95),0 1px 0 rgba(255,255,255,0.5);
      backdrop-filter:blur(16px);
      display:flex;flex-direction:column;gap:10px;align-items:center;
    }
    .auth h1{
      font-size:26px;font-weight:700;letter-spacing:.04em;margin-bottom:8px;
      background:linear-gradient(180deg,#fff 0%,#90c8f0 40%,#3a80c8 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      filter:drop-shadow(0 2px 4px rgba(30,80,160,0.3));
    }
    .auth-sub{font-size:11px;color:var(--text-light);letter-spacing:.08em;margin-top:-8px;margin-bottom:4px}
    input{
      width:100%;max-width:260px;padding:8px 12px;font-family:inherit;font-size:13px;
      background:linear-gradient(180deg,rgba(220,238,255,0.6) 0%,rgba(255,255,255,0.8) 100%);
      border:1px solid rgba(140,195,240,0.7);border-top-color:rgba(100,160,220,0.5);
      border-radius:5px;color:var(--text-dark);outline:none;
      box-shadow:inset 0 2px 4px rgba(80,140,200,0.12),0 1px 0 rgba(255,255,255,0.8);
      transition:border .15s,box-shadow .15s;
    }
    input:focus{border-color:rgba(50,130,220,0.8);box-shadow:inset 0 2px 4px rgba(50,120,210,0.15),0 0 0 3px rgba(80,160,240,0.18)}
    input::placeholder{color:#9ab8d0}

    /* AERO BUTTONS */
    .btn{
      width:100%;max-width:260px;padding:9px 18px;font-family:inherit;font-size:12px;
      font-weight:600;letter-spacing:.06em;cursor:pointer;border-radius:20px;
      background:linear-gradient(180deg,rgba(255,255,255,0.95) 0%,rgba(200,230,255,0.85) 49%,rgba(150,205,250,0.9) 50%,rgba(190,225,255,0.8) 100%);
      border:1px solid rgba(120,185,240,0.7);
      color:var(--aero-blue);
      box-shadow:0 2px 8px rgba(60,130,210,0.25),inset 0 1px 0 rgba(255,255,255,0.95),0 1px 0 rgba(255,255,255,0.6);
      transition:all .15s;
    }
    .btn:hover{
      background:linear-gradient(180deg,rgba(255,255,255,1) 0%,rgba(220,240,255,0.95) 49%,rgba(170,215,255,0.95) 50%,rgba(210,235,255,0.9) 100%);
      box-shadow:0 3px 12px rgba(60,130,210,0.35),inset 0 1px 0 rgba(255,255,255,1);
    }
    .btn:active{
      background:linear-gradient(180deg,rgba(140,195,245,0.9) 0%,rgba(100,165,230,0.85) 49%,rgba(80,150,220,0.9) 50%,rgba(120,185,245,0.85) 100%);
      color:#fff;box-shadow:inset 0 2px 4px rgba(30,80,160,0.2);
    }
    .btn-primary{
      background:linear-gradient(180deg,rgba(100,175,245,0.95) 0%,rgba(60,140,225,0.9) 49%,rgba(40,120,210,0.95) 50%,rgba(80,160,240,0.9) 100%);
      color:#fff;border-color:rgba(30,100,200,0.6);
      box-shadow:0 2px 10px rgba(30,100,200,0.35),inset 0 1px 0 rgba(255,255,255,0.45),inset 0 -1px 0 rgba(0,60,160,0.2);
    }
    .btn-primary:hover{
      background:linear-gradient(180deg,rgba(130,195,255,0.98) 0%,rgba(80,160,240,0.95) 49%,rgba(60,140,225,0.98) 50%,rgba(100,175,248,0.95) 100%);
    }
    .btn-ghost{background:linear-gradient(180deg,rgba(255,255,255,0.5) 0%,rgba(220,235,250,0.35) 100%);color:var(--text-mid);border-color:rgba(150,195,235,0.5)}
    .err{color:#c0392b;font-size:11px;max-width:260px;text-align:center;background:rgba(255,220,220,0.5);border-radius:4px;padding:4px 8px}

    .compose{
      margin:12px 12px 0;border-radius:10px;
      background:linear-gradient(180deg,rgba(255,255,255,0.55) 0%,rgba(210,235,255,0.4) 100%);
      border:1px solid rgba(255,255,255,0.85);border-bottom-color:rgba(140,195,240,0.4);
      box-shadow:0 4px 16px rgba(80,150,220,0.12),inset 0 1px 0 rgba(255,255,255,0.95);
      padding:14px 16px;
    }
    textarea{
      width:100%;resize:none;border:none;font-family:inherit;font-size:13px;
      color:var(--text-dark);background:transparent;outline:none;min-height:52px;
    }
    textarea::placeholder{color:#9ab8d0}
    .compose-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px;gap:6px;min-width:0}
    .media-btn{
      display:flex;align-items:center;gap:4px;padding:5px 9px;font-family:inherit;font-size:11px;
      font-weight:600;cursor:pointer;border-radius:14px;color:#5a9fd4;white-space:nowrap;flex-shrink:0;
      background:rgba(100,175,245,0.12);border:1px solid rgba(100,175,245,0.35);
      transition:all .15s;
    }
    .media-btn:hover{background:rgba(100,175,245,0.22)}
    #media-preview-wrap{margin-top:10px;position:relative;display:inline-block;max-width:100%}
    #media-preview-wrap img,#media-preview-wrap video{max-width:100%;max-height:280px;border-radius:8px;display:block;border:1px solid rgba(100,175,245,0.3)}
    #media-clear{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.55);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:13px;cursor:pointer;line-height:22px;text-align:center}
    .post-media{margin-top:8px}
    .post-media img{max-width:100%;border-radius:8px;display:block;border:1px solid rgba(100,175,245,0.2)}
    .post-media video{max-width:100%;border-radius:8px;display:block;border:1px solid rgba(100,175,245,0.2)}

    .post-btn{
      padding:6px 18px;font-family:inherit;font-size:11.5px;font-weight:600;cursor:pointer;border-radius:14px;flex-shrink:0;
      background:linear-gradient(180deg,rgba(100,175,245,0.95) 0%,rgba(60,140,225,0.9) 49%,rgba(40,120,210,0.95) 50%,rgba(80,160,240,0.9) 100%);
      color:#fff;border:1px solid rgba(30,100,200,0.5);letter-spacing:.04em;
      box-shadow:0 2px 8px rgba(30,100,200,0.3),inset 0 1px 0 rgba(255,255,255,0.4);
      transition:all .15s;white-space:nowrap;
    }
    .post-btn:hover{box-shadow:0 3px 12px rgba(30,100,200,0.4),inset 0 1px 0 rgba(255,255,255,0.5)}

    /* POST */
    .post{
      margin:8px 12px 0;border-radius:10px;
      background:linear-gradient(180deg,rgba(255,255,255,0.5) 0%,rgba(210,232,255,0.35) 100%);
      border:1px solid rgba(255,255,255,0.8);border-bottom-color:rgba(140,195,240,0.35);
      box-shadow:0 2px 10px rgba(80,150,220,0.08),inset 0 1px 0 rgba(255,255,255,0.9);
      padding:14px 16px;backdrop-filter:blur(8px);
      animation:fadeUp .25s ease;
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .post-meta{display:flex;align-items:baseline;gap:10px;margin-bottom:7px}
    .post-user{font-weight:700;cursor:pointer;color:var(--aero-blue);font-size:13px;transition:color .1s}
    .post-user:hover{color:var(--aero-blue2);text-decoration:underline}
    .post-time{font-size:10.5px;color:var(--text-light)}
    .post-content{line-height:1.65;color:var(--text-dark);white-space:pre-wrap;word-break:break-word}

    /* MUSIC SPECIFIC STYLES */
    .music-track {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; margin: 8px 12px 0; border-radius: 10px;
      background: linear-gradient(180deg, rgba(255,255,255,0.5) 0%, rgba(210,232,255,0.35) 100%);
      border: 1px solid rgba(255,255,255,0.8); border-bottom-color: rgba(140,195,240,0.35);
      box-shadow: 0 2px 10px rgba(80,150,220,0.08), inset 0 1px 0 rgba(255,255,255,0.9);
      transition: background 0.15s, transform 0.1s; cursor: pointer;
    }
    .music-track:hover {
      background: linear-gradient(180deg, rgba(255,255,255,0.7) 0%, rgba(220,240,255,0.5) 100%);
      transform: translateY(-1px); box-shadow: 0 4px 12px rgba(80,150,220,0.15);
    }
    .music-cover {
      width: 44px; height: 44px; border-radius: 8px; flex-shrink: 0; object-fit: cover;
      background: linear-gradient(135deg, #1e6bbf, #a0c4e8); border: 1px solid rgba(255,255,255,0.8);
    }
    .music-info { flex: 1; min-width: 0; }
    .music-title { font-size: 13.5px; font-weight: 700; color: var(--text-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px;}
    .music-composer { font-size: 11px; color: var(--text-light); }
    .music-play-btn {
      background: linear-gradient(180deg,rgba(100,175,245,0.95) 0%,rgba(50,130,220,0.9) 100%);
      color: #fff; border: 1px solid rgba(30,100,200,0.5); padding: 6px 12px; border-radius: 20px;
      font-size: 11px; font-weight: 700; cursor: pointer; transition: 0.15s; flex-shrink: 0;
    }
    .music-play-btn:hover { box-shadow: 0 2px 8px rgba(30,100,200,0.3); transform: scale(1.05); }

    /* GLOBAL MICRO PLAYER */
    .micro-player {
      position: fixed; bottom: 20px; right: 20px; z-index: 1000;
      width: 280px; padding: 12px; border-radius: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,0.85) 0%, rgba(210,235,255,0.75) 100%);
      border: 1px solid rgba(255,255,255,0.9); border-bottom-color: rgba(140,195,240,0.6);
      box-shadow: 0 8px 32px rgba(60,130,210,0.25), inset 0 1px 0 rgba(255,255,255,1);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      display: flex; flex-direction: column; gap: 10px;
      animation: fadeUp 0.3s ease forwards;
    }
    .mp-row { display: flex; align-items: center; gap: 10px; }
    .mp-cover { width: 44px; height: 44px; border-radius: 6px; object-fit: cover; background: #5a9fd4; border: 1px solid rgba(255,255,255,0.8); }
    .mp-info { flex: 1; min-width: 0; }
    .mp-title { font-size: 12.5px; font-weight: 700; color: var(--text-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px;}
    .mp-composer { font-size: 10.5px; color: var(--text-light); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mp-controls { display: flex; gap: 8px; align-items: center; }
    .mp-btn { background: none; border: none; cursor: pointer; color: var(--aero-blue); font-size: 22px; line-height: 1; transition: transform 0.1s; display: flex; align-items: center; justify-content: center; }
    .mp-btn:hover { transform: scale(1.1); color: var(--aero-blue2); }
    .mp-btn.small { font-size: 16px; color: var(--text-light); }
    .mp-btn.small:hover { color: #c0392b; }
    .mp-progress-bar { height: 6px; background: rgba(100,175,245,0.2); border-radius: 3px; overflow: hidden; cursor: pointer; border: 1px solid rgba(255,255,255,0.5); }
    .mp-progress { height: 100%; width: 0%; background: linear-gradient(90deg, #5a9fd4, #1e6bbf); transition: width 0.1s linear; }

    /* TWO-COLUMN LAYOUT */
    .two-col-layout{
      display:flex;flex-direction:row;align-items:flex-start;
      padding-top:66px;
    }
    .news-sidebar{
      width:170px;flex-shrink:0; position:sticky;top:66px;max-height:calc(100vh - 72px);overflow-y:auto; padding:10px 0 80px 10px; scrollbar-width:none;
    }
    .main-col{flex:1;min-width:0}

    @media(max-width:620px){
      #app:has(.two-col-layout){max-width:540px}
      .two-col-layout{flex-direction:column}
      .news-sidebar{width:100%;position:static;max-height:none;padding:10px 10px 0}
      .main-col{width:100%}
      .micro-player { bottom: 10px; right: 10px; left: 10px; width: auto; }
    }
    .empty{padding:40px 20px;text-align:center;color:var(--text-light);font-size:12px}
  </style>
</head>
<body>
<div id="app"></div>
<div id="notif-toast-container"></div>
<div id="global-music-player"></div>

<script>
const GITHUB_USER = 'epic22867';
const GITHUB_REPO = 'repo';
const GITHUB_BRANCH = 'main';
const LOGO_URL = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}/logo/removebg.png`;

const $ = s => document.querySelector(s);
let token = localStorage.getItem('token');
const _rawMe = localStorage.getItem('me');
let me = (_rawMe && _rawMe !== 'undefined') ? JSON.parse(_rawMe) : null;
let view = 'feed', profileUser = null;

// Global Audio Logic
let globalAudio = new Audio();
let musicList = [];
let currentTrack = null;

globalAudio.addEventListener('timeupdate', () => {
  const p = document.getElementById('mp-progress');
  if (p && globalAudio.duration) {
    p.style.width = (globalAudio.currentTime / globalAudio.duration * 100) + '%';
  }
});

globalAudio.addEventListener('ended', () => {
  document.getElementById('mp-play-btn').textContent = '▶️';
});

globalAudio.addEventListener('play', () => {
  const btn = document.getElementById('mp-play-btn');
  if (btn) btn.textContent = '⏸';
});

globalAudio.addEventListener('pause', () => {
  const btn = document.getElementById('mp-play-btn');
  if (btn) btn.textContent = '▶️';
});

function toggleGlobalAudio() {
  if (globalAudio.paused && currentTrack) globalAudio.play();
  else globalAudio.pause();
}

function closeMicroPlayer() {
  globalAudio.pause();
  document.getElementById('micro-player').style.display = 'none';
}

function playTrack(id) {
  const track = musicList.find(t => t.id === id);
  if (!track) return;
  currentTrack = track;
  globalAudio.src = track.audio_url;
  globalAudio.play();
  
  const player = document.getElementById('micro-player');
  player.style.display = 'flex';
  document.getElementById('mp-title').textContent = track.title;
  document.getElementById('mp-composer').textContent = track.composer;
  document.getElementById('mp-cover').src = track.cover_url || LOGO_URL;
}

// Render persistent micro player
document.getElementById('global-music-player').innerHTML = `
  <div id="micro-player" class="micro-player" style="display:none">
    <div class="mp-row">
      <img id="mp-cover" class="mp-cover" src="">
      <div class="mp-info">
        <div id="mp-title" class="mp-title"></div>
        <div id="mp-composer" class="mp-composer"></div>
      </div>
      <div class="mp-controls">
        <button id="mp-play-btn" class="mp-btn" onclick="toggleGlobalAudio()">▶️</button>
        <button class="mp-btn small" onclick="closeMicroPlayer()">✖</button>
      </div>
    </div>
    <div class="mp-progress-bar"><div id="mp-progress" class="mp-progress"></div></div>
  </div>`;

async function api(method, path, body) {
  const r = await fetch(path, {
    method,
    headers: { 'Content-Type': 'application/json', ...(token && { Authorization: 'Bearer ' + token }) },
    body: body ? JSON.stringify(body) : undefined
  });
  return r.json();
}

function timeAgo(d) {
  const s = Math.floor((Date.now() - new Date(d)) / 1000);
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s / 60) + 'm';
  if (s < 86400) return Math.floor(s / 3600) + 'h';
  return Math.floor(s / 86400) + 'd';
}

function escHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

async function verifyToken() {
  if (!token) return;
  const d = await api('GET', '/api/me');
  if (d.error) {
    token = null; me = null; localStorage.clear();
  } else {
    me = d; localStorage.setItem('me', JSON.stringify(me));
  }
}

function render() {
  document.body.style.backgroundImage = '';
  const app = document.getElementById('app');
  if (!token) { app.innerHTML = renderAuth(); return bindAuth(); }
  app.innerHTML = renderShell();
  
  if (view === 'feed') loadFeed();
  else if (view === 'explore') loadExplore();
  else if (view === 'music') loadMusic();
  else if (view === 'profile' && profileUser) loadProfile(profileUser);
}

function renderAuth(mode) {
  if (mode === 'register') {
    return `<div class="auth">
      <div class="auth-panel">
        <img src="${LOGO_URL}" alt="Aero World" style="width:72px;height:72px;object-fit:contain;margin-bottom:4px"><h1>Aero World</h1>
        <p class="auth-sub">create your account</p>
        <input id="ru" placeholder="choose a username" autocomplete="off">
        <input id="rp" placeholder="choose a password" type="password">
        <button class="btn btn-primary" onclick="doRegister()">Create Account</button>
        <button class="btn btn-ghost" onclick="showLogin()">← Back to Sign In</button>
        <p class="err" id="aerr" style="display:none"></p>
      </div>
    </div>`;
  }
  return `<div class="auth">
    <div class="auth-panel">
      <img src="${LOGO_URL}" alt="Aero World" style="width:72px;height:72px;object-fit:contain;margin-bottom:4px"><h1>Aero World</h1>
      <p class="auth-sub">connect · share · discover</p>
      <input id="u" placeholder="username" autocomplete="off">
      <input id="p" placeholder="password" type="password">
      <button class="btn btn-primary" onclick="doLogin()">Sign In</button>
      <button class="btn btn-ghost" onclick="showRegister()">Create Account</button>
      <p class="err" id="aerr" style="display:none"></p>
    </div>
  </div>`;
}

function showRegister() { document.getElementById('app').innerHTML = renderAuth('register'); }
function showLogin() { document.getElementById('app').innerHTML = renderAuth('login'); bindAuth(); }
function bindAuth() { document.getElementById('p')?.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); }); }

async function doLogin() {
  const el = $('#aerr');
  const d = await api('POST', '/api/login', { username: $('#u').value.trim(), password: $('#p').value });
  if (d.error) { el.textContent = d.error; el.style.display = 'block'; return; }
  token = d.token; me = d.user; localStorage.setItem('token', token); localStorage.setItem('me', JSON.stringify(me));
  render();
}

async function doRegister() {
  const el = $('#aerr');
  const username = ($('#ru') || $('#u'))?.value.trim();
  const password = ($('#rp') || $('#p'))?.value;
  if (!username) { el.textContent = 'Please enter a username.'; el.style.display = 'block'; return; }
  const d = await api('POST', '/api/register', { username, password });
  if (d.error) { el.textContent = d.error; el.style.display = 'block'; return; }
  token = d.token; me = d.user; localStorage.setItem('token', token); localStorage.setItem('me', JSON.stringify(me));
  render();
}

function renderShell() {
  const hasSidebar = (view === 'feed' || view === 'explore' || view === 'music');
  return `<div class="main">
    <nav>
      <span class="logo"><img src="${LOGO_URL}" alt="" style="height:32px;width:32px;vertical-align:middle;margin-right:6px;">Aero World</span>
      <div class="nav-links">
        <button class="${view === 'feed' ? 'active' : ''}" onclick="goto('feed')">Explore</button>
        <button class="${view === 'music' ? 'active' : ''}" onclick="goto('music')">Music</button>
        <button class="${view === 'profile' && profileUser === me?.username ? 'active' : ''}" onclick="goto('profile', me?.username)">@${escHtml(me?.username || '')}</button>
        <button class="btn-ghost" onclick="logout()" style="margin-left:auto; padding: 4px 10px">Logout</button>
      </div>
    </nav>
    ${hasSidebar
      ? `<div class="two-col-layout">
           <div class="news-sidebar" id="news-sidebar"><div style="font-size:11px;color:var(--text-light);padding:12px 10px">Loading sidebar...</div></div>
           <div class="main-col" id="content"></div>
         </div>`
      : `<div id="content"></div>`
    }
  </div>`;
}

function goto(v, user) { view = v; if (user) profileUser = user; render(); }
function logout() { token = null; me = null; localStorage.removeItem('token'); localStorage.removeItem('me'); globalAudio.pause(); document.getElementById('micro-player').style.display='none'; render(); }

async function loadFeed() {
  document.getElementById('news-sidebar').innerHTML = `<div class="empty">Sidebar Loaded</div>`;
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="compose">
      <textarea id="ta" placeholder="What's on your mind?"></textarea>
      <div class="compose-footer">
        <button class="post-btn" onclick="submitPost()">Post</button>
      </div>
    </div>
    <div id="posts"></div>`;
  const posts = await api('GET', '/api/feed');
  if (posts && posts.length) document.getElementById('posts').innerHTML = posts.map(renderPost).join('');
  else document.getElementById('posts').innerHTML = `<div class="empty">No posts yet.</div>`;
}

async function loadExplore() {
  document.getElementById('news-sidebar').innerHTML = `<div class="empty">Sidebar Loaded</div>`;
  const content = document.getElementById('content');
  content.innerHTML = `<div class="search-bar"><input id="sq" placeholder="🔍 Search..."></div><div id="results"></div>`;
  const posts = await api('GET', '/api/explore');
  if (posts && posts.length) document.getElementById('results').innerHTML = posts.map(renderPost).join('');
}

function renderPost(p) {
  return `<div class="post">
    <div class="post-meta"><span class="post-user">${escHtml(p.username)}</span> <span class="post-time">${timeAgo(p.created_at)}</span></div>
    <div class="post-content">${escHtml(p.content)}</div>
  </div>`;
}

async function submitPost() {
  const ta = document.getElementById('ta');
  if (!ta.value.trim()) return;
  const post = await api('POST', '/api/posts', { content: ta.value });
  if (post.error) return;
  ta.value = '';
  document.getElementById('posts').insertAdjacentHTML('afterbegin', renderPost(post));
}

async function loadProfile(username) {
  const content = document.getElementById('content');
  const d = await api('GET', '/api/users/' + username);
  if (d.error) { content.innerHTML = `<div class="empty">User not found.</div>`; return; }
  content.innerHTML = `<div class="compose" style="text-align:center"><h2>@${escHtml(d.username)}</h2></div>
    <div id="profile-posts">${d.posts.length ? d.posts.map(renderPost).join('') : `<div class="empty">No posts yet.</div>`}</div>`;
}

// ── MUSIC PLATFORM UI ────────────────────────────────────────

let _pendingMusicAudio = null;
let _pendingMusicCover = null;

function toggleMusicForm() {
  const form = document.getElementById('music-upload-box');
  form.style.display = form.style.display === 'none' ? 'flex' : 'none';
}

function handleMusicAudio(input) {
  const file = input.files[0];
  if (!file) return;
  // Limit to roughly 15MB for frontend checks (safe bound)
  if (file.size > 15 * 1024 * 1024) { alert("Audio file is too large (max 15MB)"); input.value = ''; return; }
  const reader = new FileReader();
  reader.onload = e => { _pendingMusicAudio = e.target.result; document.getElementById('music-file-name').textContent = 'Selected: ' + file.name; };
  reader.readAsDataURL(file);
}

function handleMusicCover(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => { 
    _pendingMusicCover = e.target.result; 
    document.getElementById('music-cover-preview').style.display = 'block';
    document.getElementById('music-cover-preview').innerHTML = `<img src="${e.target.result}" style="max-height:80px;border-radius:6px">`; 
  };
  reader.readAsDataURL(file);
}

async function submitMusic() {
  const title = document.getElementById('music-title').value.trim();
  const composer = document.getElementById('music-composer').value.trim();
  const err = document.getElementById('music-err');
  
  if (!title || !composer) { err.textContent = 'Name and Composer are required.'; err.style.display = 'block'; return; }
  if (!_pendingMusicAudio) { err.textContent = 'Please select an audio file.'; err.style.display = 'block'; return; }
  
  err.style.display = 'none';
  const btn = document.getElementById('music-submit-btn');
  btn.textContent = 'Uploading...'; btn.disabled = true;
  
  const d = await api('POST', '/api/music', {
    title, composer, audio_url: _pendingMusicAudio, cover_url: _pendingMusicCover
  });
  
  btn.textContent = 'Upload Music'; btn.disabled = false;
  if (d.error) { err.textContent = d.error; err.style.display = 'block'; return; }
  
  // Clear form and reload list
  document.getElementById('music-title').value = '';
  document.getElementById('music-composer').value = '';
  _pendingMusicAudio = null; _pendingMusicCover = null;
  document.getElementById('music-file-name').textContent = '';
  document.getElementById('music-cover-preview').style.display = 'none';
  toggleMusicForm();
  loadMusicList();
}

async function loadMusicList() {
  const listEl = document.getElementById('music-list');
  const tracks = await api('GET', '/api/music');
  if (!tracks || !tracks.length) {
    listEl.innerHTML = `<div class="empty">No music uploaded yet. Be the first!</div>`;
    return;
  }
  musicList = tracks;
  listEl.innerHTML = tracks.map(t => `
    <div class="music-track" onclick="playTrack(${t.id})">
      <img src="${t.cover_url || LOGO_URL}" class="music-cover" alt="cover">
      <div class="music-info">
        <div class="music-title">${escHtml(t.title)}</div>
        <div class="music-composer">${escHtml(t.composer)} &bull; Added by @${escHtml(t.username)}</div>
      </div>
      <button class="music-play-btn" onclick="event.stopPropagation(); playTrack(${t.id})">▶ Play</button>
    </div>
  `).join('');
}

async function loadMusic() {
  document.getElementById('news-sidebar').innerHTML = `
    <div class="compose" style="padding:10px;text-align:center;font-size:11px;color:var(--text-light)">
      Aero World Music<br><br>Listen, share, and discover tunes across the platform.
    </div>`;
    
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="compose" style="display:flex; justify-content:space-between; align-items:center;">
      <h2 style="font-size:14px;color:var(--text-dark)">Music Platform</h2>
      <button class="post-btn" onclick="toggleMusicForm()">+ Add Music</button>
    </div>
    
    <div id="music-upload-box" class="compose" style="display:none; flex-direction:column; gap:10px;">
      <input id="music-title" placeholder="Song Name (Required)">
      <input id="music-composer" placeholder="Composer Name (Required)">
      <label class="media-btn" title="Audio File" style="text-align:center;justify-content:center">
        🎧 Select Audio (MP3/WAV/OGG)
        <input type="file" id="music-file" accept="audio/*" style="display:none" onchange="handleMusicAudio(this)">
      </label>
      <span id="music-file-name" style="font-size:10px;color:var(--text-light);text-align:center"></span>
      <label class="media-btn" title="Cover Image" style="text-align:center;justify-content:center">
        🖼️ Select Cover (Optional, GIF/PNG/JPG)
        <input type="file" id="music-cover" accept="image/png,image/jpeg,image/gif" style="display:none" onchange="handleMusicCover(this)">
      </label>
      <div id="music-cover-preview" style="display:none; text-align:center"></div>
      <div id="music-err" class="err" style="display:none; margin: 0 auto"></div>
      <button id="music-submit-btn" class="post-btn" style="width:100%" onclick="submitMusic()">Upload Music</button>
    </div>
    
    <div id="music-list" style="margin-top: 10px;">
      <div class="empty">Loading music...</div>
    </div>
  `;
  loadMusicList();
}

verifyToken().then(() => render());
</script>
